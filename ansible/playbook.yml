---
- name: Configure application server
  hosts: all
  become: true
  vars:
    app_dir: /opt/app
    app_user: appuser
    python_bin: /usr/bin/python3
    venv_dir: /opt/app/.venv
    gunicorn_bin: /opt/app/.venv/bin/gunicorn
    app_port: 8000

  tasks:
    #  System packages 

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - nginx
          - curl
          - git
        state: present

    #  Application user 

    - name: Create application system user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_dir }}"
        create_home: false

    #  Application directory 

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  Sync application code 

    - name: Copy application package (app/)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy main entrypoint (main.py)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_file
      connection: local
      become: false

    - name: Copy requirements.txt
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_file.stat.exists

    - name: Check if public/ directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir
      connection: local
      become: false

    - name: Copy public/ static assets
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: public_dir.stat.exists

    #  Python virtual environment 

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: "python3 -m venv {{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"

    - name: Upgrade pip in venv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Install fastapi and uvicorn (base deps)
      ansible.builtin.pip:
        name:
          - fastapi
          - uvicorn[standard]
          - gunicorn
        state: present
        virtualenv: "{{ venv_dir }}"

    - name: Install application requirements
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: req_file.stat.exists

    - name: Fix venv ownership
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Fix app directory ownership
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    #  Systemd service 

    - name: Create systemd service unit for app
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI application (gunicorn)
          After=network.target

          [Service]
          Type=notify
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart={{ gunicorn_bin }} app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:{{ app_port }}
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=app

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app
        state: restarted
        enabled: true

    #  Nginx reverse proxy 

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Write Nginx site config
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
              }
          }

    - name: Enable Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Enable and restart Nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
        enabled: true

    #  Local health check 

    - name: Wait for app to be healthy locally
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        method: GET
        status_code: [200, 307]
        follow_redirects: all
      register: health_result
      retries: 12
      delay: 10
      until: health_result.status in [200, 307]
