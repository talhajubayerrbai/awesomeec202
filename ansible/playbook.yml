---
- name: Configure application server
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    app_user: appuser
    venv_dir: /opt/app/.venv
    project_name: "{{ project_name | default('app') }}"

  tasks:
    #  System packages 
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - nginx
          - git
          - curl
        state: present

    #  App user 
    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /bin/false
        home: "{{ app_dir }}"
        create_home: false

    #  App directory 
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  Copy application code 
    - name: Copy app package directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy main.py entrypoint
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_file
      delegate_to: localhost
      become: false

    - name: Copy requirements.txt if present
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_file.stat.exists

    - name: Check if public/ directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir
      delegate_to: localhost
      become: false

    - name: Copy public/ static assets if present
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: public_dir.stat.exists

    #  Python virtual environment + dependencies 
    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/activate"

    - name: Upgrade pip inside venv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Install gunicorn and uvicorn
      ansible.builtin.pip:
        name:
          - gunicorn
          - uvicorn[standard]
        state: present
        virtualenv: "{{ venv_dir }}"

    - name: Install app dependencies from requirements.txt
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: req_file.stat.exists

    - name: Install fastapi if no requirements.txt
      ansible.builtin.pip:
        name:
          - fastapi
          - python-multipart
        state: present
        virtualenv: "{{ venv_dir }}"
      when: not req_file.stat.exists

    #  Fix ownership 
    - name: Set ownership of app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    #  Systemd service 
    - name: Create systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        mode: "0644"
        content: |
          [Unit]
          Description={{ project_name }} FastAPI application
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment=PATH={{ venv_dir }}/bin:/usr/local/bin:/usr/bin:/bin
          Environment=PORT=8000
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:8000 \
            --access-logfile - \
            --error-logfile -
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app.service
        enabled: true
        state: started

    #  Nginx reverse proxy 
    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Write nginx app config
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 300s;
              }
          }

    - name: Enable nginx app site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Test nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Restart app after everything is in place 
    - name: Restart app service to ensure latest code is running
      ansible.builtin.systemd:
        name: app.service
        state: restarted